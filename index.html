<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>pw collision — Expense Submission</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--bg-dark:#0b0b0f;
--gold:#d4af37;
--gold-soft:#f5e6b3;
--card:#111116;
--field:#18181f;
--border:#2a2a33;
--text:#f5f5f7;
--muted:#9ca3af;
--radius:18px;
--shadow:0 40px 100px rgba(0,0,0,.6);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Poppins,Arial,sans-serif;
background:
radial-gradient(circle at 20% 20%, rgba(212,175,55,.15), transparent 40%),
radial-gradient(circle at 80% 80%, rgba(212,175,55,.08), transparent 40%),
var(--bg-dark);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:40px;
color:var(--text);
}

.card{
width:100%;
max-width:820px;
background:var(--card);
border-radius:var(--radius);
box-shadow:var(--shadow);
overflow:hidden;
border:1px solid var(--border);
}

.brand-bar{
background:linear-gradient(90deg,#0f0f14,#111116,#1a1a22);
padding:24px 30px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:1px solid var(--border);
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo svg{
height:40px;
}

.brand-bar span{
color:var(--gold-soft);
font-weight:600;
letter-spacing:1px;
font-size:14px;
}

.card-inner{padding:40px}

h1{
text-align:center;
font-size:30px;
font-weight:800;
margin:0 0 10px;
color:var(--gold);
}

.subtitle{
text-align:center;
color:var(--muted);
font-size:14px;
margin-bottom:35px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:22px;
}

.field{
display:flex;
flex-direction:column;
gap:8px;
}

label{
font-size:13px;
font-weight:500;
color:var(--gold-soft);
}

.required{color:var(--gold)}

input,textarea,select{
padding:14px 15px;
border-radius:12px;
border:1px solid var(--border);
background:var(--field);
color:var(--text);
font-size:14px;
transition:.25s ease;
}

input:focus,textarea:focus,select:focus{
outline:none;
border-color:var(--gold);
box-shadow:0 0 0 3px rgba(212,175,55,.25);
}

textarea{min-height:120px;resize:vertical}

.input-row{
display:flex;
align-items:center;
}

.currency{
padding:14px;
background:#1f1f27;
border-radius:12px 0 0 12px;
border:1px solid var(--border);
border-right:none;
color:var(--gold-soft);
font-weight:600;
}

.input-row input{
border-radius:0 12px 12px 0;
flex:1;
}

.span-2{grid-column:1/-1}

button{
width:100%;
padding:16px;
border-radius:14px;
background:linear-gradient(135deg,var(--gold),#b8962e);
border:none;
font-weight:700;
font-size:15px;
color:#111;
cursor:pointer;
margin-top:10px;
transition:.3s ease;
box-shadow:0 15px 40px rgba(212,175,55,.4);
}

button:hover{
transform:translateY(-2px);
box-shadow:0 20px 60px rgba(212,175,55,.6);
}

#successMessage{
display:none;
margin-top:25px;
padding:18px;
border-radius:14px;
background:#1a1a22;
border:1px solid var(--gold);
text-align:center;
font-weight:600;
color:var(--gold-soft);
}

.footer-note{
text-align:center;
margin-top:25px;
font-size:12px;
color:var(--muted);
}

@media(max-width:768px){
.grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<main class="card">
<div class="brand-bar">
<div class="logo">
<svg viewBox="0 0 200 60">
<text x="0" y="45" font-size="48" font-family="Poppins" fill="#d4af37" font-weight="800">PW</text>
</svg>
</div>
<span>pw collision — Employee Expense Portal</span>
</div>

<div class="card-inner">
<h1>Expense Submission</h1>
<div class="subtitle">
All submissions are securely reviewed by pw collision management
</div>

<form id="expenseForm">
<div class="grid">

<div class="field">
<label>Employee Name <span class="required">*</span></label>
<select name="email" id="employeeSelect" required>
<option value="">Select employee</option>
<option value="hardiktawar20@gmail.com">Hardik Tanwar</option>
<option value="Alex.Astts@awcollision.com">Alex Astts</option>
<option value="Allan.Rivera@awcollision.com">Allan Rivera</option>
<option value="andrea.noguera@awcollision.com">Andrea Noguera</option>
<option value="Ben.Lamond@awcollision.com">Ben Lamond</option>
<option value="Bobby@awcollision.com">Bobby Ali</option>
<option value="Guillermo.Guillon@awcollision.com">Guillermo Guillon</option>
<option value="John.Manoukian@awcollision.com">John Manoukian</option>
<option value="john.xiao@awcollision.com">John Xiao Xiao</option>
<option value="julio.flores@awcollision.com">Julio Flores</option>
<option value="marlena.roos@awcollision.com">Marlena Roos</option>
<option value="Rick.Ali@awcollision.com">Rick Ali</option>
<option value="Shelby.Harris@awcollision.com">Shelby Harris</option>
<option value="Tre.Dabney@awcollision.com">Tre Dabney</option>
<option value="tristan.harris@awcollision.com">Tristan Harris</option>
<option value="vanessa.perdomo@awcollision.com">Vanessa Perdomo</option>
<option value="chronoaiautomation@gmail.com">Chrono AI</option>
<option value="bobbyali@awcollision.com">Bobby Ali (Alt)</option>
<option value="other">Other</option>
</select>
</div>

<div class="field" id="otherNameField" style="display:none;">
<label>Your Name <span class="required">*</span></label>
<input type="text" name="other_name" placeholder="Enter your name">
</div>

<div class="field" id="otherEmailField" style="display:none;">
<label>Your Email <span class="required">*</span></label>
<input type="email" name="other_email" placeholder="Enter your email">
</div>

<div class="field">
<label>Dealership Name <span class="required">*</span></label>
<select name="dealership" required>
<option value="">Select dealership</option>
<option value="City Toyota">City Toyota</option>
<option value="Honda">Honda</option>
<option value="Lexus">Lexus</option>
<option value="BMW">BMW</option>
<option value="Autobahn Mercedes">Autobahn Mercedes</option>
<option value="Peterpan BMW">Peterpan BMW</option>
<option value="Porsche / Ferrari">Porsche / Ferrari</option>
<option value="SF Toyota">SF Toyota</option>
<option value="Genesis / Hyundai">Genesis / Hyundai</option>
<option value="Nissan">Nissan</option>
<option value="Ferrari">Ferrari</option>
<option value="Kia / Volks">Kia / Volks</option>
</select>
</div>

<div class="field">
<label>Expense Amount <span class="required">*</span></label>
<div class="input-row">
<span class="currency">$</span>
<input type="number" step="0.01" name="amount" placeholder="0.00" required>
</div>
</div>

<div class="field">
<label>RO Number <span style="color:#6b7280">(Optional)</span></label>
<input type="text" name="ro_number" placeholder="RO-123456">
</div>

<div class="field span-2">
<label>Reason for Expense <span class="required">*</span></label>
<textarea name="reason" placeholder="Explain the reason for this expense..." required></textarea>
</div>

<div class="field span-2">
<label>Receipt (Optional)</label>
<input type="file" name="receipt" accept="image/*,.pdf">
</div>

<div class="span-2">
<button type="submit">Submit for Approval</button>
</div>

</div>
</form>

<div id="successMessage">
Expense submitted successfully. Management will review it shortly.
</div>

<div class="footer-note">
Internal Use Only · pw collision
</div>
</div>
</main>

<script>
const employeeSelect = document.getElementById("employeeSelect");
const otherNameField = document.getElementById("otherNameField");
const otherEmailField = document.getElementById("otherEmailField");

employeeSelect.addEventListener("change", () => {
  if (employeeSelect.value === "other") {
    otherNameField.style.display = "flex";
    otherEmailField.style.display = "flex";
    otherNameField.querySelector("input").required = true;
    otherEmailField.querySelector("input").required = true;
  } else {
    otherNameField.style.display = "none";
    otherEmailField.style.display = "none";
    otherNameField.querySelector("input").required = false;
    otherEmailField.querySelector("input").required = false;
  }
});

const form = document.getElementById("expenseForm");
const success = document.getElementById("successMessage");

form.addEventListener("submit", async (e) => {
e.preventDefault();
const data = new FormData(form);

try{
await fetch("https://aawcr1400.app.n8n.cloud/webhook/pw_collision", {
method:"POST",
body:data
});
form.style.display="none";
success.style.display="block";
}catch{
alert("Submission failed. Please try again.");
}
});
</script>

</body>
</html>
